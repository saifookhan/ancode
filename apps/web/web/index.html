<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="*ANCODE - Short alphanumeric codes for URLs and notes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>*ANCODE</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @keyframes ancode-html-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      margin: 0;
    }
    #loading img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      animation: ancode-html-spin 2.2s linear infinite;
    }
  </style>
</head>
<body>
  <div id="loading" aria-hidden="true">
    <img src="assets/logo.png" alt="" onerror="this.onerror=null;this.src='assets/logo_mark.png';" />
  </div>
  <script>
    if (window.location.pathname.match(/^\/c\/[A-Za-z0-9]+\/?$/)) {
      const m = window.location.pathname.match(/^\/c\/([A-Za-z0-9]+)/);
      if (m) window.__ANCODE_RESOLVE_CODE__ = m[1].toUpperCase();
    }

    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

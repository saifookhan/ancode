name: shared
description: Shared models, API clients, validators, and UI kit for ANCODE
version: 1.0.0
environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  equatable: ^2.0.5
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.1
  share_plus: ^11.1.0
  pdf: ^3.10.7

flutter:
  fonts:
    - family: KitRounded
      fonts:
        - asset: fonts/KitRounded-ExtraBold.ttf
          weight: 800
        - asset: fonts/KitRounded-SemiBold.ttf
          weight: 600
        - asset: fonts/KitRounded-Regular.ttf
          weight: 400
        - asset: fonts/KitRounded-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/KitRounded-Light.ttf
          weight: 300

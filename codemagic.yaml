workflows:
  ios_testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Developer Portal integration name (Teams → Integrations) — must match exactly.
    integrations:
      app_store_connect: ancode_asc

    environment:
      flutter: stable
      xcode: latest
      # app_store_credentials must include:
      #   APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID
      # Plus CERTIFICATE_PRIVATE_KEY (RSA PEM) — required for fetch-signing-files --create; see Codemagic
      # "Alternative code signing methods iOS" / CERTIFICATE_PRIVATE_KEY. Not the same as the .p8 API key.
      groups:
        - app_store_credentials
        # For a working app (not only the config error screen), add to this Codemagic *application*
        # or a linked variable group (mark secure):
        #   SUPABASE_URL          — https://xxxx.supabase.co
        #   SUPABASE_ANON_KEY     — anon JWT (aliases: SUPABASE_KEY, SUPABASE_PUBLIC_ANON_KEY)
        # Optional: ANCODE_DOMAIN — shortlink host for QR/links
      vars:
        FLUTTER_PROJECT_DIR: apps/mobile
        BUNDLE_ID: com.mycompany.ancodefirebase
        APP_STORE_APPLE_ID: "6757865317"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter pub get
        script: |
          cd "$FLUTTER_PROJECT_DIR"
          flutter pub get

      # Do NOT use environment.ios_signing with bundle_identifier here — that only matches
      # profiles already uploaded under Code signing identities and fails with "No matching profiles".
      # This flow pulls/creates App Store profile + cert from Apple during the build.
      - name: Set up keychain for code signing
        script: keychain initialize

      - name: Fetch signing files from Apple (App Store)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles \
            --project "$FLUTTER_PROJECT_DIR/ios/Runner.xcodeproj" \
            --archive-method app-store

      - name: Build iOS IPA for TestFlight
        script: |
          cd "$FLUTTER_PROJECT_DIR"
          # Resolve common alternate variable names (Codemagic / other tooling).
          SUPABASE_URL_RESOLVED="${SUPABASE_URL:-${SUPABASE_PROJECT_URL:-}}"
          SUPABASE_KEY_RESOLVED="${SUPABASE_ANON_KEY:-${SUPABASE_KEY:-${SUPABASE_PUBLIC_ANON_KEY:-}}}"
          DART_DEFINES=()
          if [ -n "$SUPABASE_URL_RESOLVED" ] && [ -n "$SUPABASE_KEY_RESOLVED" ]; then
            umask 077
            printf '%s\n' "SUPABASE_URL=$SUPABASE_URL_RESOLVED" "SUPABASE_ANON_KEY=$SUPABASE_KEY_RESOLVED" > assets/.env
            if [ -n "${ANCODE_DOMAIN:-}" ]; then
              printf '%s\n' "ANCODE_DOMAIN=$ANCODE_DOMAIN" >> assets/.env
            fi
            DART_DEFINES+=(
              "--dart-define=SUPABASE_URL=$SUPABASE_URL_RESOLVED"
              "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_KEY_RESOLVED"
            )
            if [ -n "${ANCODE_DOMAIN:-}" ]; then
              DART_DEFINES+=("--dart-define=ANCODE_DOMAIN=$ANCODE_DOMAIN")
            fi
          else
            echo "----------------------------------------------------------------"
            echo "WARNING: Supabase env not set — build continues, but the app will"
            echo "show the configuration screen until you add variables in Codemagic:"
            echo "  Application → Environment variables → SUPABASE_URL + SUPABASE_ANON_KEY"
            echo "(optional aliases: SUPABASE_PROJECT_URL, SUPABASE_KEY)"
            echo "----------------------------------------------------------------"
          fi
          # CFBundleVersion must be at most 18 characters (App Store / altool validation).
          # CM_BUILD_ID is often 19+ digits; prefer CM_BUILD_NUMBER (sequential) or truncate.
          if [ -n "${CM_BUILD_NUMBER:-}" ]; then
            BUILD_NUMBER="$CM_BUILD_NUMBER"
          else
            BUILD_NUMBER="${CM_BUILD_ID:-1}"
          fi
          while [ "${#BUILD_NUMBER}" -gt 18 ]; do
            BUILD_NUMBER="${BUILD_NUMBER#?}"
          done
          flutter build ipa --release --build-name=1.0.1 --build-number="$BUILD_NUMBER" "${DART_DEFINES[@]}"

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
